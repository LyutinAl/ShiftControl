groups:
  - name: api_alerts
    interval: 30s
    rules:

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) * 100 > 5
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Высокий уровень ошибок API"
          description: >-
            Уровень 5xx ошибок {{ $value | printf "%.2f" }}%
            превышает порог 5%
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/high-error-rate"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Высокая задержка API"
          description: >-
            P95 latency {{ $value | printf "%.3f" }}s превышает 500 мс
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/high-latency"

      - alert: ServiceDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Сервис API недоступен"
          description: >-
            Prometheus не может скрейпить метрики
            с {{ $labels.instance }} более 1 минуты
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/service-down"

      - alert: HighCPUUsage
        expr: |
          (
            1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))
          ) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Высокое использование CPU"
          description: >-
            CPU использует {{ $value | printf "%.1f" }}%,
            порог 80%
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/high-cpu"

  - name: security_alerts
    interval: 30s
    rules:

      - alert: SuspiciousErrorSpike
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) * 100 > 10
        for: 2m
        labels:
          severity: critical
          team: backend
          type: security
        annotations:
          summary: "Подозрительный рост ошибок — возможна атака"
          description: >-
            Уровень 5xx ошибок {{ $value | printf "%.2f" }}% превысил 10%.
            Возможна SQL-инъекция, попытка переполнения буфера или сканирование уязвимостей.
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/suspicious-error-spike"

      - alert: AbnormalRequestRate
        expr: |
          sum(rate(http_requests_total[1m])) * 60 > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
          type: security
        annotations:
          summary: "Аномально высокая частота запросов"
          description: >-
            RPS составляет {{ $value | printf "%.0f" }} запросов/мин.
            Возможна DDoS-атака или автоматизированное сканирование уязвимостей.
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/abnormal-request-rate"

      - alert: AuthFailureSpike
        expr: |
          sum(rate(http_requests_total{status_code="401"}[5m])) > 5
        for: 3m
        labels:
          severity: warning
          team: backend
          type: security
        annotations:
          summary: "Всплеск ошибок аутентификации — возможен брутфорс"
          description: >-
            Более {{ $value | printf "%.1f" }} запросов/сек завершаются 401.
            Возможна атака перебором паролей или использование скомпрометированных токенов.
          runbook_url: "https://github.com/LyutinAl/ShiftControl/wiki/runbooks/auth-failure-spike"
