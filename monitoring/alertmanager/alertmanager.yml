global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'  # pragma: allowlist secret
  smtp_require_tls: false

route:
  receiver: 'email-default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      continue: true

    - match:
        severity: warning
      receiver: 'email-warning'

receivers:
  - name: 'email-default'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        html: |
          <h2>{{ .CommonLabels.alertname }}</h2>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          <p>{{ .CommonAnnotations.description }}</p>
          {{ if .CommonAnnotations.runbook_url }}
          <p><a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a></p>
          {{ end }}

  - name: 'email-critical'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .CommonLabels.alertname }}'
        html: |
          <h2 style="color: red;">CRITICAL: {{ .CommonLabels.alertname }}</h2>
          {{ range .Alerts.Firing }}
          <p><strong>Started:</strong> {{ .StartsAt }}</p>
          {{ end }}
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          {{ if .CommonAnnotations.runbook_url }}
          <p><a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a></p>
          {{ end }}

  - name: 'email-warning'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[WARNING] {{ .CommonLabels.alertname }}'
        html: |
          <h2 style="color: orange;">WARNING: {{ .CommonLabels.alertname }}</h2>
          <p>{{ .CommonAnnotations.description }}</p>

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
