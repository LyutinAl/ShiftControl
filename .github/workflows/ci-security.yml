name: Security

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

  trivy-fs:
    name: SCA / Filesystem (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem — block on fixable CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Save full JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          format: json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"
          output: trivy-fs-report.json

      - name: Upload FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.json

  trivy-image:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: shiftcontrol-backend:scan
          cache-from: type=gha,scope=security-scan
          cache-to: type=gha,scope=security-scan,mode=max

      - name: Scan image — block on fixable CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shiftcontrol-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Save full JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shiftcontrol-backend:scan
          format: json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: "0"
          output: trivy-image-report.json

      - name: Upload image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

  sbom-generation:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json
          upload-artifact: true
          artifact-name: sbom

  dast:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres  # pragma: allowlist secret
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/testdb  # pragma: allowlist secret
      SECRET_KEY: dast-scan-ephemeral-key-not-production  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dast-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-dast-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8000'
          cmd_options: '-I'
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-detection, trivy-fs, trivy-image, sbom-generation, dast]
    steps:
      - name: All security checks passed
        run: echo "Security gate passed — Gitleaks, Trivy FS, Image Scan, SBOM, and DAST are clean"
