name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8==7.1.1 black==24.10.0

      - name: flake8
        run: flake8 backend/ --config backend/setup.cfg

      - name: black --check
        run: black --check --line-length 120 backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/testdb
      SECRET_KEY: ci_test_secret_key_not_used_in_unit_tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit==1.8.3

      - name: Run bandit
        run: bandit -r backend/ -x backend/venv,backend/tests -ll
